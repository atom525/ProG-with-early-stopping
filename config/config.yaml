# ProG Configuration - RecBole-style Config
# ==========================================
# 路径规范：data/ 数据 | checkpoints/ 权重 | logs/ 日志 | outputs/ 中间数据，均带时间戳

# 路径配置（固定目录）
data_root: data
pretrain_save_dir: checkpoints/pretrain
checkpoint_dir: checkpoints/downstream
log_dir: logs
sample_data_dir: outputs/sample_data
induced_graph_dir: outputs/induced_graph

# 数据划分（预训练与下游统一：train / valid / test）
split_ratio: [0.8, 0.1, 0.1]

# 随机种子（可复现性）
seed: 42                      # 数据划分、模型初始化等
runseed: 0                    # 多次运行实验时的种子

# 早停
patience: 10                    # 连续多少轮验证指标不提升则停止
# 可选：valid_acc / valid_f1 / valid_auroc / valid_auprc，下游任务早停指标
early_stopping_metric: valid_acc

# 模型保存（验证集指标最优时保存）
save_best: true

# 训练
epochs: 10000
batch_size: 128
lr: 0.001
weight_decay: 0.0

# 验证
evaluate_every: 5               # 每多少 epoch 在验证集上评估并打印
